[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.27"
evm_version = "cancun"

# See https://book.getfoundry.sh/reference/config/ for full configuration.

# Enable the Solidity optimizer for cheaper deployments.
optimizer = true
optimizer_runs = 200

# Generate IR-optimized AST for better ABI generation.
ast = true

# Fuzz testing configuration.
[fuzz]
runs = 256

# RPC endpoints — used by `forge script --rpc-url <name>`
[rpc_endpoints]
anvil = "http://localhost:8545"
sepolia = "${SEPOLIA_RPC}"
